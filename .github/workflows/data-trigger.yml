# Trigger shim carried by the orphan 'data' branch (publish.sh in the private
# repo copies it from origin/main at publish time, next to archive.db.gz).
#
# Workflows run from the PUSHED ref, so when the data branch carried a full
# copy of pages.yml it went stale between publishes -- gates added on main
# were missing from the copy the publish path actually ran. This shim has no
# build logic to drift: it dispatches pages.yml AS IT CURRENTLY EXISTS ON
# MAIN.
#
# Why dispatch and not a reusable-workflow call: same-repo `uses:` only
# accepts the ./ form, which resolves in the PUSHED ref -- the data branch,
# where pages.yml deliberately does not exist (the owner/repo@ref form is
# rejected for same-repo references; tried, failed at parse).
#
# GITHUB_TOKEN-created events normally don't start new runs, but
# workflow_dispatch via the API is one of the sanctioned exceptions.
#
# On main itself this file is inert (its only trigger is a data push, and a
# data push runs the data branch's copy of it).
name: Build & deploy archive (data publish)

on:
  push:
    branches: [data]

permissions:
  actions: write              # dispatch pages.yml on main

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - run: gh workflow run pages.yml --ref main --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
