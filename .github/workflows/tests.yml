name: tests

# Run the Python unit tests (charset/mojibake, the HTML sanitizer, the address
# obfuscation + scraper-dodge forms, attachment sanitisation, the dbhash
# republication fingerprint, threading, rendering). pages.yml gates the DEPLOY
# on the JS UI tests; this gates CODE PUSHES on the Python suite, so a privacy /
# obfuscation regression is caught here before it can reach a published build.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install --quiet pytest==9.0.3 lxml==6.0.2
      - run: python -m pytest tests/ -q
