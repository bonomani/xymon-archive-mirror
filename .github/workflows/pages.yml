name: Build & deploy archive

# Thin GitHub wrapper around the portable build. The real work is in
# ./build.sh, which has no GitHub dependency. The obfuscated DB is NOT kept in
# this branch's history (it would accumulate blobs that have leaked PII before);
# it lives on the orphan 'data' branch, force-pushed by the private publisher.
# That branch also carries this workflow file so its push can start Actions;
# the job explicitly checks out canonical code from main, pulls archive.db.gz
# from data, renders, and deploys.

on:
  push:
    branches: [main, data]    # code change (main) or new DB (data) -> re-render
  schedule:
    - cron: "17 4 * * 1"      # weekly, Monday 04:17 UTC
  workflow_dispatch:

permissions:
  contents: read          # read-only: the DB is no longer committed back here
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # actions still target Node 20

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Always take the CODE from main, whichever ref triggered us. A push to the
      # 'data' branch (new DB) triggers this same workflow -- but that branch only
      # carries archive.db.gz + this workflow file, not the code.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      # lxml backs fold.py (server-side quote folding). The build degrades to
      # unfolded thread pages without it, so a stale workflow copy on the
      # 'data' branch still deploys -- but keep this in sync there anyway.
      - run: pip install --quiet lxml==6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      # The obfuscated DB lives on the orphan 'data' branch (kept out of main's
      # history). Pull it into the build dir; build.sh decompresses it.
      - name: Fetch published DB from data branch
        run: |
          git fetch --depth=1 origin data
          git show origin/data:archive.db.gz > archive.db.gz
          ls -l archive.db.gz

      # Rebuild the site from the committed (already-obfuscated) DB. Pipermail
      # is frozen (the list moved to Mailman 3), so CI does NOT re-crawl --
      # that avoids reintroducing cleartext addresses and salt-inconsistency.
      # New content is imported locally (import_mbox.py) and committed.
      # Restore the previous rendered site so the build is incremental: only
      # message pages whose content changed get re-rendered (see generate.py).
      # Unique key per run + a "site-" restore prefix = always restore the most
      # recent prior site. A cache miss -> generate.py auto-falls back to full.
      - name: Restore previous site
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: site
          key: site-${{ github.run_id }}
          restore-keys: site-

      - name: Build site
        run: REFRESH=0 ./build.sh
        env:
          INCREMENTAL: "1"
        # When a live source comes online, set REFRESH=1 + its env, and add
        # OBFUSCATE_SALT as a secret so pseudonyms stay consistent:
        #   OBFUSCATE_SALT: ${{ secrets.OBFUSCATE_SALT }}
        #   GH_DISCUSSIONS_REPO: ${{ github.repository }}
        #   IMAP_HOST: ${{ secrets.IMAP_HOST }}

      - name: Save site cache
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: always()
        with:
          path: site
          key: site-${{ github.run_id }}

      # NOTE: the DB is no longer committed back here. CI runs REFRESH=0 (no
      # crawl) so the DB never changes during render; the authoritative DB is
      # produced by the private publisher and pushed to the 'data' branch.

      # Behavioural UI tests against the built site -- a failure blocks the deploy.
      - name: UI tests (jsdom)
        run: |
          npm install --no-audit --no-fund
          SITE=site FULL=1 node tests/ui_test.js

      # Non-blocking measurement of the folder over the corpus (numbers in the log).
      - name: Fold stats
        run: SITE=site SAMPLE=400 node tests/fold_stats.js || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

  # GitHub-specific #2: deploy to Pages. Replace this job to host elsewhere
  # (rsync, Netlify, S3, ...) -- the build job above stays unchanged.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
